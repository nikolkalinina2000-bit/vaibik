<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вайбик — фильмы</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=3">
    <link rel="shortcut icon" href="/favicon.png?v=3">
    <link rel="apple-touch-icon" href="/favicon.png?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        :root { --bg: #F2EFE9; --text: #4A3729; --text-muted: #7A5E4A; --card-bg: #FFFFFF; --card-border: #E2D4C8; --btn-bg: #FFFFFF; --btn-active: #DBC8B5; --btn-text: #4A3729; --accent: #A87B5A; --footer-bg: rgba(255, 250, 240, 0.7); --slider-bg: #DCCCB9; --slider-thumb: #B5875A; --muted: #7A5E4A; --shadow-sm: 0 6px 12px -8px rgba(0,0,0,0.08); --shadow-md: 0 12px 24px -12px rgba(0,0,0,0.1); --shadow-lg: 0 20px 30px -15px rgba(0,0,0,0.12); }
        body.dark { --bg: #2A241E; --text: #F0E2D4; --text-muted: #C5B19B; --card-bg: #3D3228; --card-border: #5E4E3E; --btn-bg: #3D3228; --btn-active: #5E4B38; --btn-text: #E0D4C8; --accent: #C9A87C; --footer-bg: rgba(30, 25, 22, 0.8); --slider-bg: #5E4E3E; --slider-thumb: #C9A87C; --muted: #C5B19B; --shadow-sm: 0 6px 12px -8px rgba(0,0,0,0.3); --shadow-md: 0 12px 24px -12px rgba(0,0,0,0.4); --shadow-lg: 0 20px 30px -15px rgba(0,0,0,0.5); }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; padding: 1.5rem 1.5rem 0; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.3s, color 0.3s; position: relative; }
        body::before { content: ""; position: fixed; top: -15%; left: -15%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(180, 140, 100, 0.15), transparent 70%); border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none; }
        body::after { content: ""; position: fixed; bottom: -15%; right: -15%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(140, 100, 70, 0.12), transparent 70%); border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none; }
        body.dark::before { background: radial-gradient(circle, rgba(100, 80, 60, 0.25), transparent 70%); }
        body.dark::after { background: radial-gradient(circle, rgba(80, 60, 40, 0.2), transparent 70%); }
        .container { max-width: 1200px; margin: 0 auto; flex: 1; position: relative; z-index: 2; }
        .theme-switch { position: fixed; top: 1.5rem; right: 1.5rem; background: var(--btn-bg); border: 1px solid var(--card-border); font-size: 0.8rem; font-weight: 500; color: var(--muted); cursor: pointer; z-index: 100; transition: 0.2s; font-family: 'Quicksand', sans-serif; padding: 6px 14px; border-radius: 30px; backdrop-filter: blur(4px); box-shadow: var(--shadow-sm); }
        .theme-switch:hover { color: var(--text); background: var(--btn-active); transform: translateY(-2px); }
        
        .logo-link { text-decoration: none; display: block; }
        .logo-wrapper { display: flex; justify-content: center; align-items: baseline; gap: 0.15rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
        .cloud-letter { display: inline-block; font-size: 4rem; font-weight: 600; background: linear-gradient(135deg, #E6D0B5, #B5875A); background-clip: text; -webkit-background-clip: text; color: transparent; margin: 0; padding: 0; transition: all 0.2s ease; animation: float 3s infinite ease-in-out; text-shadow: 0 0 12px rgba(139, 90, 43, 0.2), 0 0 20px rgba(139, 90, 43, 0.1); filter: blur(0.3px); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        .cloud-letter:hover { transform: translateY(-8px); filter: blur(0px); text-shadow: 0 0 18px rgba(139, 90, 43, 0.3); }
        
        .tagline { text-align: center; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); letter-spacing: 4px; margin-bottom: 1.5rem; }
        .nav-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .nav-link { background: transparent; border: none; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.2s; text-decoration: none; padding: 0.2rem 0; border-bottom: 1px dashed transparent; }
        .nav-link:hover { color: var(--accent); border-bottom-color: var(--accent); }
        .filters-section { margin-bottom: 2rem; text-align: center; }
        .filters-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 1rem; }
        .filters-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem; }
        .filter-btn { background: var(--btn-bg); border: 1px solid var(--card-border); padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.75rem; font-weight: 500; color: var(--btn-text); cursor: pointer; transition: 0.2s; }
        .filter-btn.active { background: var(--btn-active); color: var(--text); }
        .filter-btn:hover { background: var(--btn-active); transform: translateY(-2px); }
        
        .mood-message {
            background: var(--footer-bg);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--accent);
            border: 1px solid var(--card-border);
            display: none;
        }
        
        /* СЕТКА: ТРИ КАРТОЧКИ В РЯД (как в книгах, но 3 колонки) */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 900px) {
            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.2rem;
            }
        }
        @media (max-width: 600px) {
            .movies-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Карточка фильма — плавное появление и поднятие как в книгах */
        .movie-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--card-border);
            padding: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: default;
            box-shadow: var(--shadow-sm);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }
        
        .save-btn { position: absolute; top: 0.8rem; right: 0.8rem; background: transparent; border: none; font-size: 2rem; cursor: pointer; transition: 0.2s; color: var(--text-muted); opacity: 0.85; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 5; line-height: 1; }
        .save-btn span { display: inline-block; transform: scaleX(0.9) scaleY(0.85); }
        .save-btn:hover { background: rgba(168, 123, 90, 0.6); opacity: 1; transform: scale(1.05); }
        .save-btn.saved { color: #D36F52; opacity: 1; background: rgba(211, 111, 82, 0.5); }
        body.dark .save-btn.saved { color: #EAA67C; background: rgba(234, 166, 124, 0.5); }
        
        .movie-poster { background: #DDCDBA; border-radius: 1rem; height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.8rem; overflow: hidden; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; }
        .movie-poster-placeholder { font-size: 0.9rem; font-weight: 500; color: #8F7A64; text-align: center; padding: 1rem; }
        .movie-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.2rem; color: var(--text); }
        .movie-year { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.3rem; }
        .movie-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.5rem; }
        .movie-tag { background: var(--btn-active); padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.6rem; color: var(--btn-text); }
        .movie-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.3; margin-bottom: 0.6rem; }
        .movie-ratings { display: flex; flex-direction: column; gap: 0.2rem; margin-top: 0.3rem; margin-bottom: 0.5rem; }
        .rating-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.6rem; font-weight: 500; color: var(--text); }
        .rating-label { width: 52px; font-size: 0.6rem; }
        .rating-bar { flex: 1; height: 3px; background: var(--slider-bg); border-radius: 2px; overflow: hidden; }
        .rating-fill { height: 100%; width: 0%; border-radius: 2px; }
        .rating-fill.trogaet { background: #9B8A78; }
        .rating-fill.sogrevaet { background: #D8B48F; }
        .rating-value { width: 25px; text-align: right; font-size: 0.6rem; }
        
        /* Кнопки — без подъёма, только изменение фона */
        .watch-links {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: auto;
            padding-top: 0.5rem;
        }
        .watch-link {
            background: var(--btn-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 0.3rem 0.8rem;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--btn-text);
            text-decoration: none;
            transition: background 0.2s ease;
            text-align: center;
            flex: 1;
            white-space: nowrap;
        }
        .watch-link:hover {
            background: var(--btn-active);
        }
        
        .site-footer { margin-top: 2rem; background: var(--footer-bg); backdrop-filter: blur(8px); border-radius: 2rem 2rem 0 0; padding: 1rem 1.5rem; border-top: 1px solid var(--card-border); text-align: center; }
        .footer-content { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; max-width: 1000px; margin: 0 auto; }
        .footer-about { font-size: 0.7rem; color: var(--text-muted); text-align: left; flex: 2; }
        .footer-contacts { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; justify-content: center; }
        .footer-contacts a { color: var(--text-muted); text-decoration: none; font-size: 0.75rem; transition: 0.2s; }
        .footer-contacts a:hover { color: var(--accent); }
        .footer-copyright { text-align: center; font-size: 0.6rem; color: var(--text-muted); margin-top: 0.8rem; border-top: 0.5px solid var(--card-border); padding-top: 0.6rem; }
        .help-btn-red { background-color: var(--accent); border: none; color: white; padding: 0.6rem 1.2rem; border-radius: 40px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 1rem; box-shadow: var(--shadow-sm); }
        .help-btn-red:hover { background-color: #8C644A; transform: scale(1.01); box-shadow: var(--shadow-md); }
        .credits { font-size: 0.6rem; color: var(--text-muted); }
        
        .floating-mixer { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.2s; z-index: 1000; }
        .floating-mixer:hover { transform: scale(1.05); background: #8C644A; }
        body.dark .floating-mixer { background: #C9A87C; }
        body.dark .floating-mixer:hover { background: #B08B62; }
        .mixer-modal { position: fixed; bottom: 6rem; right: 2rem; width: 280px; background: var(--card-bg); border-radius: 1.5rem; border: 1px solid var(--card-border); box-shadow: var(--shadow-md); padding: 1rem; z-index: 1001; display: none; backdrop-filter: blur(8px); }
        .mixer-modal.active { display: block; }
        .mixer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-weight: 600; color: var(--text); }
        .mixer-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
        .mixer-sound-item { display: flex; align-items: center; margin-bottom: 0.8rem; gap: 0.5rem; }
        .mixer-sound-name { width: 65px; font-size: 0.85rem; font-weight: 600; color: var(--text); cursor: pointer; transition: 0.2s; }
        .mixer-sound-name.active { color: var(--accent); }
        .mixer-sound-name:hover { color: var(--accent); }
        .mixer-slider { flex: 1; height: 4px; -webkit-appearance: none; background: var(--slider-bg); border-radius: 4px; }
        .mixer-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--slider-thumb); border-radius: 50%; cursor: pointer; }
        .mixer-value { font-size: 0.7rem; color: var(--text-muted); width: 35px; text-align: center; }
        .mixer-btn { width: 100%; background: var(--btn-bg); border: none; border-radius: 40px; padding: 0.3rem; font-size: 0.7rem; font-weight: 500; color: var(--btn-text); cursor: pointer; margin-top: 0.5rem; }
        .mixer-btn:hover { background: var(--btn-active); }
        
        @media (max-width: 650px) { 
            .cloud-letter { font-size: 2.4rem; } 
            .logo-wrapper { gap: 0.1rem; } 
            .theme-switch { top: 1rem; right: 1rem; font-size: 0.7rem; padding: 4px 10px; } 
            .floating-mixer { width: 48px; height: 48px; font-size: 1.5rem; bottom: 1.5rem; right: 1.5rem; } 
            .mixer-modal { width: 260px; right: 0.5rem; bottom: 5rem; } 
            .save-btn { width: 40px; height: 40px; font-size: 1.7rem; } 
            .watch-link { font-size: 0.6rem; padding: 0.2rem 0.4rem; white-space: normal; }
            .watch-links { gap: 0.3rem; }
        }
    </style>
</head>
<body>

<script>
    const soundsList = [
        { name: 'дождь', key: 'rain', url: 'https://github.com/nikolkalinina2000-bit/qwwqqww/raw/refs/heads/main/%D0%B4%D0%BE%D0%B6%D0%B4%D1%8C%20(2).mp3' },
        { name: 'костёр', key: 'fire', url: 'https://github.com/nikolkalinina2000-bit/qwwqqww/raw/refs/heads/main/%D0%BA%D0%BE%D1%81%D1%82%D0%B5%D1%80.mp3' },
        { name: 'море', key: 'sea', url: 'https://github.com/nikolkalinina2000-bit/qwwqqww/raw/refs/heads/main/%D0%BC%D0%BE%D1%80%D0%B5.mp3' },
        { name: 'ветер', key: 'wind', url: 'https://github.com/nikolkalinina2000-bit/qwwqqww/raw/refs/heads/main/%D0%BB%D0%B5%D1%81.mp3' },
        { name: 'гроза', key: 'storm', url: 'https://github.com/nikolkalinina2000-bit/qwwqqww/raw/refs/heads/main/%D0%B3%D1%80%D0%BE%D0%B7%D0%B0.mp3' }
    ];
    let audioElements = {}, activeStates = {}, volumes = {};
    soundsList.forEach(sound => {
        activeStates[sound.key] = false;
        volumes[sound.key] = 0.4;
        audioElements[sound.key] = new Audio(sound.url);
        audioElements[sound.key].loop = true;
        audioElements[sound.key].volume = volumes[sound.key];
        audioElements[sound.key].load();
    });
    function loadSoundSettings() {
        try {
            const savedVolumes = localStorage.getItem('vaibik_sound_volumes');
            if (savedVolumes) Object.assign(volumes, JSON.parse(savedVolumes));
            const savedActive = localStorage.getItem('vaibik_sound_active');
            if (savedActive) Object.assign(activeStates, JSON.parse(savedActive));
            for (let key in volumes) if (audioElements[key]) audioElements[key].volume = volumes[key];
            for (let key in activeStates) if (activeStates[key] && audioElements[key]) audioElements[key].play().catch(e=>console.warn(e));
        } catch(e) {}
    }
    function saveSoundSettings() {
        localStorage.setItem('vaibik_sound_volumes', JSON.stringify(volumes));
        localStorage.setItem('vaibik_sound_active', JSON.stringify(activeStates));
    }
    function updateMixerUI() {
        const container = document.getElementById('mixerSoundsList');
        if (!container) return;
        container.innerHTML = '';
        soundsList.forEach(sound => {
            const div = document.createElement('div');
            div.className = 'mixer-sound-item';
            div.innerHTML = `
                <span class="mixer-sound-name ${activeStates[sound.key] ? 'active' : ''}" data-key="${sound.key}">${sound.name}</span>
                <input type="range" class="mixer-slider" data-key="${sound.key}" min="0" max="100" step="1" value="${Math.round(volumes[sound.key] * 100)}">
                <span class="mixer-value">${Math.round(volumes[sound.key] * 100)}%</span>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll('.mixer-sound-name').forEach(el => {
            const key = el.dataset.key;
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (activeStates[key]) {
                    audioElements[key].pause();
                    activeStates[key] = false;
                    el.classList.remove('active');
                } else {
                    audioElements[key].play().catch(e=>console.warn(e));
                    activeStates[key] = true;
                    el.classList.add('active');
                }
                saveSoundSettings();
                updateMixerUI();
            });
        });
        document.querySelectorAll('.mixer-slider').forEach(slider => {
            slider.addEventListener('input', (e) => {
                const key = slider.dataset.key;
                const val = parseInt(e.target.value) / 100;
                volumes[key] = val;
                if (audioElements[key]) audioElements[key].volume = val;
                slider.nextElementSibling.innerText = e.target.value + '%';
                saveSoundSettings();
            });
        });
    }
    function muteAllSounds() {
        for (let key in audioElements) {
            if (activeStates[key]) {
                audioElements[key].pause();
                activeStates[key] = false;
            }
        }
        saveSoundSettings();
        updateMixerUI();
    }
    const modal = document.getElementById('mixerModal');
    document.getElementById('floatingMixerBtn').addEventListener('click', () => {
        modal.classList.toggle('active');
        updateMixerUI();
    });
    document.getElementById('mixerCloseBtn').addEventListener('click', () => modal.classList.remove('active'));
    document.getElementById('muteAllBtn').addEventListener('click', muteAllSounds);
    loadSoundSettings();

    const movies = [

    let savedMovies = JSON.parse(localStorage.getItem('vaibik_saved_movies') || '[]');
    function saveMovie(id) { if (!savedMovies.includes(id)) { savedMovies.push(id); localStorage.setItem('vaibik_saved_movies', JSON.stringify(savedMovies)); } }
    function unsaveMovie(id) { savedMovies = savedMovies.filter(mid => mid !== id); localStorage.setItem('vaibik_saved_movies', JSON.stringify(savedMovies)); }
    function isSaved(id) { return savedMovies.includes(id); }

    function renderMovies(filterState = "all") {
        const container = document.getElementById("moviesGrid");
        container.innerHTML = "";
        const filtered = movies.filter(m => filterState === "all" || m.states.includes(filterState));
        filtered.forEach((m, idx) => {
            const card = document.createElement("div");
            card.className = "movie-card";
            card.style.animationDelay = `${idx * 0.05}s`;
            const saved = isSaved(m.id);
            const posterHtml = m.posterUrl ? `<img src="${m.posterUrl}" alt="${m.title}" loading="lazy">` : `<div class="movie-poster-placeholder">${m.title}<br>🎬</div>`;
            const tagsHtml = m.tags.map(tag => `<span class="movie-tag">${tag}</span>`).join('');
            
            let watchButtons = '';
            if (m.kinopoiskUrl) watchButtons += `<a href="${m.kinopoiskUrl}" target="_blank" class="watch-link">Кинопоиск</a>`;
            if (m.rutubeUrl) watchButtons += `<a href="${m.rutubeUrl}" target="_blank" class="watch-link">RuTube</a>`;
            if (m.vkUrl) watchButtons += `<a href="${m.vkUrl}" target="_blank" class="watch-link">VK Видео</a>`;
            
            card.innerHTML = `
                <button class="save-btn ${saved ? 'saved' : ''}" data-id="${m.id}"><span>♥</span></button>
                <div class="movie-poster">${posterHtml}</div>
                <div class="movie-title">${m.title}</div>
                <div class="movie-year">${m.year}</div>
                <div class="movie-tags">${tagsHtml}</div>
                <div class="movie-desc">${m.desc}</div>
                <div class="movie-ratings">
                    <div class="rating-item"><span class="rating-label">Трогает</span><div class="rating-bar"><div class="rating-fill trogaet" style="width: ${m.trogaet * 10}%;"></div></div><span class="rating-value">${m.trogaet}/10</span></div>
                    <div class="rating-item"><span class="rating-label">Согревает</span><div class="rating-bar"><div class="rating-fill sogrevaet" style="width: ${m.sogrevaet * 10}%;"></div></div><span class="rating-value">${m.sogrevaet}/10</span></div>
                </div>
                <div class="watch-links">
                    ${watchButtons}
                </div>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.save-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                if (btn.classList.contains('saved')) {
                    unsaveMovie(id);
                    btn.classList.remove('saved');
                } else {
                    saveMovie(id);
                    btn.classList.add('saved');
                }
            });
        });
    }

    function initFilters() { 
        const btns = document.querySelectorAll(".filter-btn"); 
        btns.forEach(btn => { 
            btn.addEventListener("click", () => { 
                btns.forEach(b => b.classList.remove("active")); 
                btn.classList.add("active"); 
                renderMovies(btn.getAttribute("data-filter")); 
            }); 
        }); 
    }

    function applyMoodFilter() {
        const urlParams = new URLSearchParams(window.location.search);
        const mood = urlParams.get('mood');
        let filterValue = null;
        let messageText = '';

        switch (mood) {
            case 'empty':        filterValue = 'grust'; messageText = '🔆 Подборка для чувства опустошённости: фильмы, которые помогают найти тепло.'; break;
            case 'anxious':      filterValue = 'trevoga'; messageText = '🌿 Подборка для тревоги: фильмы, которые помогают успокоиться.'; break;
            case 'angry':        filterValue = 'gnev'; messageText = '💥 Подборка для гнева: фильмы, которые помогают выпустить пар.'; break;
            case 'confused':     filterValue = 'pusto'; messageText = '🌀 Подборка, когда не знаешь, что чувствуешь: фильмы, которые помогают найти смысл.'; break;
            case 'lonely':       filterValue = 'odin'; messageText = '🤍 Подборка для одиночества: фильмы, которые помогают почувствовать связь.'; break;
            default:
                renderMovies('all');
                const msgDiv = document.getElementById('moodMessage');
                if (msgDiv) msgDiv.style.display = 'none';
                return;
        }

        if (filterValue) {
            const targetBtn = document.querySelector(`.filter-btn[data-filter="${filterValue}"]`);
            if (targetBtn) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                targetBtn.classList.add('active');
                renderMovies(filterValue);
            } else {
                renderMovies(filterValue);
            }
            const moodMsgDiv = document.getElementById('moodMessage');
            if (moodMsgDiv) {
                moodMsgDiv.style.display = 'block';
                moodMsgDiv.innerHTML = messageText;
            }
        }
    }

    function initTheme() { 
        const savedTheme = localStorage.getItem('vaibik_theme'); 
        const toggleBtn = document.getElementById('themeToggle'); 
        if (savedTheme === 'dark') { 
            document.body.classList.add('dark'); 
            toggleBtn.innerText = 'светлая тема'; 
        } else { 
            document.body.classList.remove('dark'); 
            toggleBtn.innerText = 'тёмная тема'; 
        } 
    }
    function toggleTheme() { 
        const toggleBtn = document.getElementById('themeToggle'); 
        if (document.body.classList.contains('dark')) { 
            document.body.classList.remove('dark'); 
            localStorage.setItem('vaibik_theme', 'light'); 
            toggleBtn.innerText = 'тёмная тема'; 
        } else { 
            document.body.classList.add('dark'); 
            localStorage.setItem('vaibik_theme', 'dark'); 
            toggleBtn.innerText = 'светлая тема'; 
        } 
    }
    document.getElementById('helpBtn').onclick = () => window.location.href = 'help.html';
    document.getElementById('contactEmail').onclick = () => alert('Скопируйте адрес: hello@vaibik.ru');
    document.getElementById('contactTelegram').onclick = () => window.open('https://t.me/vaibik_project', '_blank');
    document.getElementById('contactInstagram').onclick = () => window.open('https://www.instagram.com/vaibik.project', '_blank');
    
    initFilters();
    applyMoodFilter();
    initTheme();
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
</script>
</body>
</html>
